<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth Engine Calculator | STUFF: The Killer of American Wealth</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --accent-green: #10b981;
            --accent-blue: #3b82f6;
            --border-color: #334155;
            --input-bg: #0f172a;
        }

        .light-mode {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #0f172a;
            --text-muted: #64748b;
            --accent-green: #059669;
            --accent-blue: #2563eb;
            --border-color: #cbd5e1;
            --input-bg: #f1f5f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            padding: 30px;
            border: 1px solid var(--border-color);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.025em;
        }

        h1 span {
            color: var(--accent-green);
        }

        .theme-toggle {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .grid-layout {
                grid-template-columns: 1fr;
            }
        }

        .input-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative;
        }

        .label-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Tooltip Styling */
        .tooltip-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            background: var(--border-color);
            color: var(--text-color);
            border-radius: 50%;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: help;
            position: relative;
        }

        .tooltip-icon:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            background: #0f172a;
            color: #ffffff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: normal;
            width: 240px;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            line-height: 1.4;
            text-align: left;
            border: 1px solid #334155;
            pointer-events: none;
        }

        input {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .results-section {
            background: var(--input-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 15px;
        }

        .metric-card {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .metric-title {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .metric-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent-green);
        }

        .split-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            border-top: 1px solid var(--border-color);
            padding-top: 12px;
        }

        .split-subvalue {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-color);
        }

        .chart-container {
            margin-top: 30px;
            position: relative;
            height: 300px;
            width: 100%;
        }
    </style>
</head>
<body class="light-mode">

    <div class="container">
        <header>
            <h1>Wealth Engine <span>Calculator</span></h1>
            <button class="theme-toggle" onclick="toggleTheme()">🌓 Theme</button>
        </header>

        <div class="grid-layout">
            <div class="input-section">
                <div class="input-group">
                    <div class="label-row">
                        <label for="currentAge">Current Age
                            <span class="tooltip-icon" data-tooltip="Your starting age on the timeline. Time is your ultimate asset; starting early lets compounding work its magic.">ⓘ</span>
                        </label>
                    </div>
                    <input type="number" id="currentAge" value="22" min="1" max="100" oninput="calculateWealth()">
                </div>

                <div class="input-group">
                    <div class="label-row">
                        <label for="targetAge">Target Freedom Age
                            <span class="tooltip-icon" data-tooltip="The age you plan to achieve financial freedom and step off the performance treadmill.">ⓘ</span>
                        </label>
                    </div>
                    <input type="number" id="targetAge" value="61" min="1" max="100" oninput="calculateWealth()">
                </div>

                <div class="input-group">
                    <div class="label-row">
                        <label for="initialDeposit">Initial Deposit ($)
                            <span class="tooltip-icon" data-tooltip="Your starting principal capital placed into broad-market index funds on Day One.">ⓘ</span>
                        </label>
                    </div>
                    <input type="number" id="initialDeposit" value="2500" step="500" oninput="calculateWealth()">
                </div>

                <div class="input-group">
                    <div class="label-row">
                        <label for="annualContribution">Initial Annual Contribution ($)
                            <span class="tooltip-icon" data-tooltip="The total amount you consistently feed into your wealth engine every single year.">ⓘ</span>
                        </label>
                    </div>
                    <input type="number" id="annualContribution" value="2500" step="500" oninput="calculateWealth()">
                </div>

                <div class="input-group">
                    <div class="label-row">
                        <label for="annualIncrease">Annual Contribution Increase (%)
                            <span class="tooltip-icon" data-tooltip="Your annual percentage escalation rate (e.g., 5%) representing career growth and increased automated savings discipline.">ⓘ</span>
                        </label>
                    </div>
                    <input type="number" id="annualIncrease" value="5" step="0.5" oninput="calculateWealth()">
                </div>

                <div class="input-group">
                    <div class="label-row">
                        <label for="annualReturn">Anticipated Annual Return (%)
                            <span class="tooltip-icon" data-tooltip="The historical average annual compound return (~8.7%) of a low-cost broad-market index fund engine.">ⓘ</span>
                        </label>
                    </div>
                    <input type="number" id="annualReturn" value="8.7" step="0.1" oninput="calculateWealth()">
                </div>
            </div>

            <div class="results-section">
                <div class="metric-card">
                    <div class="metric-title">Target Freedom Portfolio</div>
                    <div class="metric-value" id="finalBalance">$0</div>
                </div>

                <div class="metric-card">
                    <div class="metric-title">Safe Monthly Withdrawal (4% Rule)</div>
                    <div class="split-subvalue" id="monthlyWithdrawal" style="color: var(--accent-blue); font-size: 1.4rem;">$0 / mo</div>
                </div>

                <div class="split-box">
                    <div class="metric-card">
                        <div class="metric-title">Total Principal</div>
                        <div class="split-subvalue" id="totalPrincipal">$0</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-title">Compound Interest</div>
                        <div class="split-subvalue" id="totalInterest" style="color: var(--accent-green);">$0</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="wealthChart"></canvas>
        </div>
    </div>

    <script>
        let wealthChart = null;

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
        }

        function formatCurrency(amount) {
            return '$' + Math.round(amount).toLocaleString();
        }

        function calculateWealth() {
            const currentAge = parseInt(document.getElementById('currentAge').value) || 0;
            const targetAge = parseInt(document.getElementById('targetAge').value) || 0;
            let initialDeposit = parseFloat(document.getElementById('initialDeposit').value) || 0;
            let annualContribution = parseFloat(document.getElementById('annualContribution').value) || 0;
            const annualIncrease = (parseFloat(document.getElementById('annualIncrease').value) || 0) / 100;
            const annualReturn = (parseFloat(document.getElementById('annualReturn').value) || 0) / 100;

            if (targetAge <= currentAge) {
                return;
            }

            const years = targetAge - currentAge;
            let balance = initialDeposit;
            let totalPrincipal = initialDeposit;
            
            let ages = [currentAge];
            let balances = [initialDeposit];
            let principals = [initialDeposit];

            let currentContribution = annualContribution;

            for (let i = 1; i <= years; i++) {
                // Add contribution at start or end of year (standard year-end growth model)
                balance = (balance + currentContribution) * (1 + annualReturn);
                totalPrincipal += currentContribution;

                ages.push(currentAge + i);
                balances.push(Math.round(balance));
                principals.push(Math.round(totalPrincipal));

                // Scale contribution for next year
                currentContribution *= (1 + annualIncrease);
            }

            const totalInterest = balance - totalPrincipal;
            const monthlyWithdrawal = (balance * 0.04) / 12;

            document.getElementById('finalBalance').innerText = formatCurrency(balance);
            document.getElementById('totalPrincipal').innerText = formatCurrency(totalPrincipal);
            document.getElementById('totalInterest').innerText = formatCurrency(totalInterest);
            document.getElementById('monthlyWithdrawal').innerText = formatCurrency(monthlyWithdrawal) + ' / mo';

            updateChart(ages, balances, principals);
        }

        function updateChart(ages, balances, principals) {
            const ctx = document.getElementById('wealthChart').getContext('2d');
            const isLight = document.body.classList.contains('light-mode');
            const gridColor = isLight ? '#cbd5e1' : '#334155';
            const textColor = isLight ? '#64748b' : '#94a3b8';

            if (wealthChart) {
                wealthChart.destroy();
            }

            wealthChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ages,
                    datasets: [
                        {
                            label: 'Total Portfolio Balance',
                            data: balances,
                            borderColor: '#10b981',
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.1
                        },
                        {
                            label: 'Total Principal Invested',
                            data: principals,
                            borderColor: '#3b82f6',
                            borderWidth: 2,
                            borderDash: [5, 5],
                            fill: false,
                            tension: 0.1
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: {
                                color: textColor,
                                font: { weight: '600' }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: gridColor },
                            ticks: { color: textColor }
                        },
                        y: {
                            grid: { color: gridColor },
                            ticks: {
                                color: textColor,
                                callback: function(value) {
                                    return '$' + (value >= 1000 ? (value / 1000) + 'k' : value);
                                }
                            }
                        }
                    }
                }
            });
        }

        // Run initial calculation on load
        window.onload = calculateWealth;
    </script>
</body>
</html>
